<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행 영어 마스터 (클라우드 저장 지원)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    body {
      font-family: 'Noto Sans KR', sans-serif;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translate(-50%, -20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 pb-24 min-h-screen flex flex-col">

  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center max-w-xs text-center">
      <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p class="font-bold text-slate-800 text-lg">데이터 연결 중</p>
      <p class="text-slate-500 text-sm mt-1">클라우드에서 학습 정보를 불러오고 있습니다...</p>
    </div>
  </div>

  <!-- 알림 토스트 -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg text-sm font-medium" id="toast-text">
      알림 메시지
    </div>
  </div>

  <!-- 헤더 -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
      <h1 class="text-xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent flex items-center gap-2">
        ✈️ 여행 영어 마스터
      </h1>
      <span id="cloud-status" class="flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-amber-50 text-amber-600 border border-amber-100">
        <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span>
        동기화 대기 중
      </span>
    </div>
  </header>

  <!-- 메인 콘텐츠 영역 -->
  <main class="max-w-4xl mx-auto px-4 py-8 flex-1 w-full">
    
    <!-- 탭 1: 오늘의 문장 -->
    <div id="tab-today-content" class="space-y-6 animate-fade-in">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
            <i data-lucide="calendar" class="w-6 h-6 text-blue-500"></i>
            Day <span id="display-day">1</span> - 오늘의 문장
          </h2>
          <span class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
            총 저장됨: <span id="display-saved-count">0</span>개
          </span>
        </div>
        
        <p class="text-slate-600 mb-6 text-sm">
          매일 새롭게 제시되는 5개의 필수 여행 영어입니다. 이 문장들은 클라우드에 자동으로 평생 저장됩니다.
        </p>

        <!-- 오늘 배울 문장 카드들 -->
        <div id="today-sentences-container" class="space-y-4">
          <!-- JS로 동적 생성 -->
        </div>

        <div class="mt-8 flex justify-center">
          <button 
            id="btn-next-day"
            class="flex items-center gap-2 px-6 py-3 bg-slate-800 text-white rounded-full font-medium hover:bg-slate-700 active:scale-95 transition-all shadow-md"
          >
            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            다음 날로 넘어가기 (새 문장 추가)
          </button>
        </div>
      </div>
    </div>

    <!-- 탭 2: 음성 복습하기 -->
    <div id="tab-review-content" class="hidden max-w-xl mx-auto w-full animate-fade-in">
      
      <!-- 진행 상황 프로그레스 바 -->
      <div class="mb-6">
        <div class="flex justify-between text-sm text-slate-500 mb-2 font-medium">
          <span>복습 진행 상황</span>
          <span id="review-progress-text">0 / 0</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2.5">
          <div id="review-progress-bar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>
      </div>

      <div class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden relative">
        <div class="p-8 text-center min-h-[250px] flex flex-col justify-center items-center">
          <p class="text-slate-400 font-medium mb-4">이 뜻에 맞는 영어 문장을 직접 말씀해 보세요!</p>
          <h2 id="review-korean-text" class="text-2xl md:text-3xl font-bold text-slate-800 break-keep leading-snug">
            -
          </h2>

          <!-- 정답 판단 애니메이션 영역 -->
          <div id="review-feedback" class="mt-8 min-h-[64px] flex flex-col items-center justify-center">
            <!-- 맞춤 / 틀림 / 대기 상태 동적 삽입 -->
          </div>

          <!-- 음성 인식된 텍스트 -->
          <div id="recognized-speech-container" class="mt-4 p-3 bg-slate-50 rounded-lg hidden max-w-full">
            <p class="text-xs text-slate-400 mb-1">인식된 음성:</p>
            <p id="recognized-speech-text" class="text-sm font-medium text-slate-700 italic">"..."</p>
          </div>
        </div>

        <!-- 하단 컨트롤 영역 -->
        <div class="bg-slate-50 p-6 border-t border-slate-100 flex flex-col items-center space-y-6">
          
          <!-- 정답 공개창 (정답을 맞췄거나 힌트 보기를 누르면 활성화됨) -->
          <div id="review-answer-container" class="hidden w-full bg-white p-4 rounded-xl border border-blue-100 text-center relative animate-fade-in shadow-sm">
            <p id="review-answer-text" class="text-xl font-bold text-blue-600 pr-8"></p>
            <button 
              id="btn-speak-answer"
              class="absolute top-1/2 -translate-y-1/2 right-4 p-2 text-slate-400 hover:text-blue-500 transition-colors"
              title="발음 듣기"
            >
              <i data-lucide="volume-2" class="w-6 h-6"></i>
            </button>
          </div>

          <div class="flex items-center justify-center gap-8 w-full">
            <!-- 힌트 / 정답 보기 버튼 -->
            <button 
              id="btn-show-hint"
              class="p-4 rounded-full text-slate-500 hover:bg-slate-200 active:scale-95 transition-all"
              title="정답 보기"
            >
              <i data-lucide="help-circle" class="w-7 h-7"></i>
            </button>

            <!-- 중앙 마이크 버튼 -->
            <div class="relative">
              <span id="recording-ping" class="absolute -inset-4 rounded-full bg-red-100 animate-ping opacity-75 hidden"></span>
              <button
                id="btn-mic"
                class="relative p-6 rounded-full shadow-lg transform hover:scale-105 active:scale-95 transition-all bg-blue-600 text-white shadow-blue-200 hover:bg-blue-700"
              >
                <i data-lucide="mic" id="mic-icon" class="w-10 h-10"></i>
              </button>
            </div>

            <!-- 다음 문제 이동 버튼 -->
            <button 
              id="btn-next-review"
              class="p-4 rounded-full text-slate-400 hover:bg-slate-200 active:scale-95 transition-all"
              title="다음 문장"
            >
              <i data-lucide="arrow-right" class="w-7 h-7"></i>
            </button>
          </div>
          
          <p id="recording-status-text" class="text-slate-400 font-medium text-sm hidden">
            목소리를 듣고 있습니다... 영어로 말해보세요!
          </p>
        </div>
      </div>
    </div>

    <!-- 탭 2-Empty: 복습용 저장 데이터가 없는 경우 -->
    <div id="tab-review-empty" class="hidden text-center py-20 animate-fade-in">
      <div class="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400">
        <i data-lucide="book-open" class="w-8 h-8"></i>
      </div>
      <h3 class="text-xl font-bold text-slate-700 mb-2">복습할 문장이 아직 없습니다</h3>
      <p class="text-slate-500">먼저 '오늘의 문장' 탭에서 첫 여행 영어를 확인해 보세요.</p>
    </div>

  </main>

  <!-- 하단 네비게이션 바 -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 pb-safe z-10 shadow-lg">
    <div class="max-w-md mx-auto flex">
      <button
        id="tab-today"
        class="flex-1 py-4 flex flex-col items-center justify-center text-blue-600 transition-colors"
      >
        <i data-lucide="calendar" class="w-6 h-6 mb-1"></i>
        <span class="text-xs font-semibold">오늘의 문장</span>
      </button>
      
      <button
        id="tab-review"
        class="flex-1 py-4 flex flex-col items-center justify-center text-slate-400 hover:text-slate-600 transition-colors relative"
      >
        <i data-lucide="mic" class="w-6 h-6 mb-1"></i>
        <span class="text-xs font-semibold">음성 복습하기</span>
        <span id="badge-saved-count" class="absolute top-2 right-1/4 translate-x-4 bg-rose-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
      </button>
    </div>
  </nav>

  <!-- Firebase 모듈 CDN 로드 (v11.6.1) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // === 여행 영어 전체 풀 데이터 ===
    const SENTENCE_POOL = [
      { ko: "체크인 부탁드립니다.", en: "I'd like to check in, please." },
      { ko: "체크아웃 시간은 언제인가요?", en: "What time is checkout?" },
      { ko: "수건을 더 주실 수 있나요?", en: "Could I get extra towels?" },
      { ko: "와이파이 비밀번호가 무엇인가요?", en: "What's the Wi-Fi password?" },
      { ko: "짐을 보관해 주실 수 있나요?", en: "Can you keep my luggage?" },
      { ko: "메뉴판 좀 볼 수 있을까요?", en: "Can I see the menu, please?" },
      { ko: "두 명 자리 있나요?", en: "Table for two, please." },
      { ko: "계산서 좀 갖다 주시겠어요?", en: "Check, please." },
      { ko: "이것과 같은 것으로 주세요.", en: "I'll have what he's having." },
      { ko: "물 좀 주시겠어요?", en: "Could I have some water?" },
      { ko: "가장 가까운 지하철역이 어디인가요?", en: "Where is the nearest subway station?" },
      { ko: "공항까지 얼마나 걸리나요?", en: "How long does it take to the airport?" },
      { ko: "이 주소로 가주세요.", en: "Please take me to this address." },
      { ko: "여기서 세워주세요.", en: "Please pull over here." },
      { ko: "표는 어디서 사나요?", en: "Where can I buy a ticket?" },
      { ko: "이거 얼마인가요?", en: "How much is this?" },
      { ko: "다른 색상도 있나요?", en: "Do you have this in a different color?" },
      { ko: "이걸로 할게요.", en: "I'll take it." },
      { ko: "입어봐도 될까요?", en: "Can I try it on?" },
      { ko: "조금 깎아주실 수 있나요?", en: "Can you give me a discount?" },
      { ko: "화장실이 어디에 있나요?", en: "Where is the restroom?" },
      { ko: "사진 좀 찍어주시겠어요?", en: "Could you take a picture for me?" },
      { ko: "길을 잃었어요.", en: "I'm lost." },
      { ko: "도와주실 수 있나요?", en: "Can you help me?" },
      { ko: "한국어 하시는 분 있나요?", en: "Is there anyone who speaks Korean?" },
      { ko: "수하물 찾는 곳이 어디인가요?", en: "Where is the baggage claim?" },
      { ko: "신고할 물건이 없습니다.", en: "I have nothing to declare." },
      { ko: "방을 예약했습니다.", en: "I have a reservation." },
      { ko: "조식은 포함되어 있나요?", en: "Is breakfast included?" },
      { ko: "방을 바꿔주실 수 있나요?", en: "Can I change my room?" },
      { ko: "추천해 주실 만한 메뉴가 있나요?", en: "What do you recommend?" },
      { ko: "포장해 주시겠어요?", en: "Can I get this to go?" },
      { ko: "덜 맵게 해 주세요.", en: "Please make it less spicy." },
      { ko: "기차역으로 가는 길을 알려주세요.", en: "Could you tell me the way to the train station?" },
      { ko: "이 버스 시청 가나요?", en: "Does this bus go to City Hall?" },
      { ko: "택시를 불러주실 수 있나요?", en: "Could you call a taxi for me?" },
      { ko: "영수증 주세요.", en: "Can I get a receipt?" },
      { ko: "교환이나 환불이 되나요?", en: "Can I get an exchange or a refund?" },
      { ko: "면세가 되나요?", en: "Is this tax-free?" },
      { ko: "경찰을 불러주세요!", en: "Please call the police!" }
    ];

    // === Firebase 환경 초기화 ===
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // === 전역 애플리케이션 상태 ===
    let currentUser = null;
    let userState = {
      dayCount: 1,
      todaySentences: [],
      allSavedSentences: []
    };

    // 음성 인식 및 재생 관련 변수
    let recognition = null;
    let isRecording = false;
    let reviewList = [];
    let currentReviewIndex = 0;
    let isSpeechSupported = false;

    // === 초기 실행 함수 ===
    window.addEventListener('DOMContentLoaded', async () => {
      lucide.createIcons();
      initSpeechRecognition();
      setupEventListeners();
      
      // 사용자 인증
      await handleAuth();
    });

    // === 사용자 로그인 관리 ===
    async function handleAuth() {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("인증 실패:", error);
        showToast("인터넷 연결을 확인하고 다시 실행해주세요.");
      }

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          currentUser = user;
          document.getElementById('cloud-status').className = "flex items-center gap-1.5 text-xs font-semibold px-2.5 py-1 rounded-full bg-green-50 text-green-600 border border-green-100";
          document.getElementById('cloud-status').innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span>클라우드 연동 완료`;
          
          // 사용자의 이전 학습 데이터 로드
          await loadUserData();
        } else {
          hideLoading();
        }
      });
    }

    // === 클라우드 데이터 읽기 ===
    async function loadUserData() {
      if (!currentUser) return;

      const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'learning_state', 'main');
      try {
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          userState = docSnap.data();
          // 로드된 데이터 화면 갱신
          updateTodaySentencesUI();
          updateCountsUI();
        } else {
          // 신규 유저라면 최초 5문장 자동 생성 후 클라우드 저장
          await generateNewDaySentences(true);
        }
      } catch (err) {
        console.error("데이터 로드 에러:", err);
        showToast("데이터를 가져오는 도중 오류가 생겼습니다.");
      } finally {
        hideLoading();
      }
    }

    // === 클라우드 데이터 쓰기 ===
    async function saveUserData() {
      if (!currentUser) return;
      
      const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'learning_state', 'main');
      try {
        await setDoc(docRef, userState);
      } catch (err) {
        console.error("저장 에러:", err);
        showToast("클라우드 저장 실패! 연결을 확인해주세요.");
      }
    }

    // === 오늘의 문장 생성 로직 ===
    async function generateNewDaySentences(isInitial = false) {
      // 미배운 문장 추출
      const available = SENTENCE_POOL.filter(item => 
        !userState.allSavedSentences.some(saved => saved.en === item.en)
      );

      if (available.length === 0) {
        showToast("대단해요! 모든 저장 문장을 이미 정복했습니다. 복습을 추천합니다.");
        return;
      }

      // 무작위로 섞어서 최대 5문장 추출
      const shuffled = [...available].sort(() => 0.5 - Math.random());
      const selected = shuffled.slice(0, 5);

      if (!isInitial) {
        userState.dayCount += 1;
      }
      userState.todaySentences = selected;
      userState.allSavedSentences = [...userState.allSavedSentences, ...selected];

      // UI 및 클라우드 업데이트
      updateTodaySentencesUI();
      updateCountsUI();
      await saveUserData();

      if (!isInitial) {
        showToast(`Day ${userState.dayCount} 시작! 새로운 5문장이 저장되었습니다.`);
      }
    }

    // 오늘의 문장 목록 UI 갱신
    function updateTodaySentencesUI() {
      const container = document.getElementById('today-sentences-container');
      container.innerHTML = '';

      userState.todaySentences.forEach((item) => {
        const div = document.createElement('div');
        div.className = "p-4 rounded-xl bg-slate-50 border border-slate-100 hover:border-blue-200 transition-colors flex justify-between items-center group";
        div.innerHTML = `
          <div>
            <p class="font-bold text-slate-800 mb-1 text-base md:text-lg">${item.en}</p>
            <p class="text-slate-500 text-sm">${item.ko}</p>
          </div>
          <button class="btn-tts-play p-3 bg-white rounded-full text-blue-500 shadow-sm border border-slate-100 hover:bg-blue-50 hover:scale-105 active:scale-95 transition-all" data-text="${item.en}">
            <i data-lucide="volume-2" class="w-5 h-5"></i>
          </button>
        `;
        container.appendChild(div);
      });

      // 동적 추가된 TTS 버튼들에 이벤트 추가
      document.querySelectorAll('.btn-tts-play').forEach(btn => {
        btn.addEventListener('click', () => {
          speakText(btn.getAttribute('data-text'));
        });
      });

      document.getElementById('display-day').textContent = userState.dayCount;
      lucide.createIcons();
    }

    function updateCountsUI() {
      const count = userState.allSavedSentences.length;
      document.getElementById('display-saved-count').textContent = count;
      
      const badge = document.getElementById('badge-saved-count');
      if (count > 0) {
        badge.textContent = count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    // === 음성 인식 엔진 초기화 (Web Speech API) ===
    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
          isRecording = true;
          document.getElementById('recording-ping').classList.remove('hidden');
          document.getElementById('recording-status-text').classList.remove('hidden');
          const micBtn = document.getElementById('btn-mic');
          micBtn.className = "relative p-6 rounded-full shadow-lg transform hover:scale-105 active:scale-95 transition-all bg-red-500 text-white shadow-red-200";
          document.getElementById('mic-icon').setAttribute('data-lucide', 'mic-off');
          lucide.createIcons();
        };

        recognition.onend = () => {
          isRecording = false;
          document.getElementById('recording-ping').classList.add('hidden');
          document.getElementById('recording-status-text').classList.add('hidden');
          const micBtn = document.getElementById('btn-mic');
          micBtn.className = "relative p-6 rounded-full shadow-lg transform hover:scale-105 active:scale-95 transition-all bg-blue-600 text-white shadow-blue-200 hover:bg-blue-700";
          document.getElementById('mic-icon').setAttribute('data-lucide', 'mic');
          lucide.createIcons();
        };

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          handleVoiceResult(transcript);
        };

        recognition.onerror = (event) => {
          console.error("인식 에러:", event.error);
          isRecording = false;
          if (event.error === 'not-allowed') {
            showToast("마이크 사용 권한을 허용해 주셔야 영어 발음 인식이 가능합니다.");
          } else if (event.error !== 'no-speech') {
            showToast(`음성 인식 오류: ${event.error}`);
          }
        };
        isSpeechSupported = true;
      }
    }

    // 마이크 제어
    function toggleRecording() {
      if (!isSpeechSupported) {
        showToast("현재 브라우저는 영어 음성 인식을 지원하지 않습니다. Chrome 환경을 권장합니다.");
        return;
      }
      if (isRecording) {
        recognition.stop();
      } else {
        document.getElementById('recognized-speech-container').classList.add('hidden');
        document.getElementById('review-feedback').innerHTML = '';
        try {
          recognition.start();
        } catch (e) {
          recognition.stop();
        }
      }
    }

    // === 복습하기 탭 동작 로직 ===
    function startReviewSession() {
      if (userState.allSavedSentences.length === 0) {
        document.getElementById('tab-review-content').classList.add('hidden');
        document.getElementById('tab-review-empty').classList.remove('hidden');
        return;
      }

      document.getElementById('tab-review-empty').classList.add('hidden');
      document.getElementById('tab-review-content').classList.remove('hidden');

      // 저장된 전체 데이터 셔플링
      reviewList = [...userState.allSavedSentences].sort(() => 0.5 - Math.random());
      currentReviewIndex = 0;
      loadReviewQuestion();
    }

    function loadReviewQuestion() {
      if (reviewList.length === 0) return;
      
      const currentItem = reviewList[currentReviewIndex];
      document.getElementById('review-korean-text').textContent = `"${currentItem.ko}"`;
      document.getElementById('review-feedback').innerHTML = '';
      
      // 인식 테스트 상자 가림
      document.getElementById('recognized-speech-container').classList.add('hidden');
      document.getElementById('review-answer-container').classList.add('hidden');
      
      // 프로그레스 바 갱신
      const progress = ((currentReviewIndex) / reviewList.length) * 100;
      document.getElementById('review-progress-bar').style.width = `${progress}%`;
      document.getElementById('review-progress-text').textContent = `${currentReviewIndex + 1} / ${reviewList.length}`;
      
      // 마이크 상태 버튼 정상화
      document.getElementById('btn-mic').removeAttribute('disabled');
      document.getElementById('btn-show-hint').removeAttribute('disabled');
    }

    // 음성 인식 답변 판단
    function handleVoiceResult(spoken) {
      const currentItem = reviewList[currentReviewIndex];
      const target = currentItem.en;

      // 텍스트 정규화 비교
      const normSpoken = spoken.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
      const normTarget = target.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();

      // 결과 텍스트 안내 표시
      document.getElementById('recognized-speech-container').classList.remove('hidden');
      document.getElementById('recognized-speech-text').textContent = `"${spoken}"`;

      if (normSpoken === normTarget) {
        // 성공 UI 피드백
        document.getElementById('review-feedback').innerHTML = `
          <div class="animate-bounce flex flex-col items-center text-green-600">
            <i data-lucide="check-circle" class="w-10 h-10 mb-1"></i>
            <p class="font-bold text-lg">Perfect! 참 잘하셨어요.</p>
          </div>
        `;
        lucide.createIcons();
        showCorrectAnswer();
        speakText(target);
      } else {
        // 실패 피드백
        document.getElementById('review-feedback').innerHTML = `
          <div class="animate-pulse flex flex-col items-center text-rose-500">
            <i data-lucide="x-circle" class="w-10 h-10 mb-1"></i>
            <p class="font-medium text-sm">발음을 다시 한 번 들어보고 따라해보세요.</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    // 정답 보기 버튼이나 정답을 완벽하게 맞췄을 때 정답창 출력
    function showCorrectAnswer() {
      const currentItem = reviewList[currentReviewIndex];
      document.getElementById('review-answer-text').textContent = currentItem.en;
      document.getElementById('review-answer-container').classList.remove('hidden');
      
      // 추가 음성 오작동 방지
      document.getElementById('btn-mic').setAttribute('disabled', 'true');
      document.getElementById('btn-show-hint').setAttribute('disabled', 'true');
    }

    // TTS 발음 송출 함수
    function speakText(text) {
      if (!window.speechSynthesis) {
        showToast("해당 웹 브라우저에서 영문 음성 합성(TTS) 출력을 지원하지 않습니다.");
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      window.speechSynthesis.speak(utterance);
    }

    // === 이벤트 리스너 통합 바인딩 ===
    function setupEventListeners() {
      // 탭 토글 처리
      const btnTabToday = document.getElementById('tab-today');
      const btnTabReview = document.getElementById('tab-review');
      const todayView = document.getElementById('tab-today-content');
      const reviewView = document.getElementById('tab-review-content');
      const reviewEmptyView = document.getElementById('tab-review-empty');

      btnTabToday.addEventListener('click', () => {
        btnTabToday.className = "flex-1 py-4 flex flex-col items-center justify-center text-blue-600 transition-colors";
        btnTabReview.className = "flex-1 py-4 flex flex-col items-center justify-center text-slate-400 hover:text-slate-600 transition-colors relative";
        
        todayView.classList.remove('hidden');
        reviewView.classList.add('hidden');
        reviewEmptyView.classList.add('hidden');
        
        if (isRecording) {
          recognition.stop();
        }
      });

      btnTabReview.addEventListener('click', () => {
        btnTabReview.className = "flex-1 py-4 flex flex-col items-center justify-center text-blue-600 transition-colors relative";
        btnTabToday.className = "flex-1 py-4 flex flex-col items-center justify-center text-slate-400 hover:text-slate-600 transition-colors";
        
        todayView.classList.add('hidden');
        startReviewSession();
      });

      // 다음 날로 넘어가기 버튼 클릭
      document.getElementById('btn-next-day').addEventListener('click', async () => {
        await generateNewDaySentences();
      });

      // 복습 모드 컨트롤러들
      document.getElementById('btn-mic').addEventListener('click', toggleRecording);
      document.getElementById('btn-show-hint').addEventListener('click', showCorrectAnswer);
      
      document.getElementById('btn-next-review').addEventListener('click', () => {
        if (currentReviewIndex < reviewList.length - 1) {
          currentReviewIndex += 1;
          loadReviewQuestion();
        } else {
          showToast("축하합니다! 저장된 오늘의 복습 세션을 모두 마쳤습니다.");
          startReviewSession();
        }
      });

      document.getElementById('btn-speak-answer').addEventListener('click', () => {
        if (reviewList[currentReviewIndex]) {
          speakText(reviewList[currentReviewIndex].en);
        }
      });
    }

    // === UI 유틸리티 ===
    function hideLoading() {
      const loader = document.getElementById('loading-overlay');
      loader.classList.add('opacity-0');
      setTimeout(() => loader.classList.add('hidden'), 300);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      const text = document.getElementById('toast-text');
      text.textContent = msg;
      
      toast.classList.remove('hidden');
      toast.className = "fixed top-4 left-1/2 -translate-x-1/2 z-50 animate-fade-in-down";
      
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 3000);
    }
  </script>
</body>
</html>
