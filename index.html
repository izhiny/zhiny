<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌏 여행 영어 마스터</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #0F172A;
    color: #F1F5F9;
    min-height: 100vh;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #1E3A5F 0%, #0F172A 100%);
    padding: 20px 20px 0;
    border-bottom: 1px solid #1E293B;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .header-logo { font-size: 28px; }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header-sub { font-size: 12px; color: #94A3B8; }
  .header-badge {
    margin-left: auto;
    background: #1E3A5F;
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: #60A5FA;
    white-space: nowrap;
  }
  /* Tabs */
  .tabs {
    max-width: 480px;
    margin: 12px auto 0;
    display: flex;
    gap: 2px;
  }
  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    color: #64748B;
    font-size: 12px;
    font-weight: 400;
    padding: 10px 4px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn.active {
    color: #60A5FA;
    font-weight: 700;
    border-bottom: 2px solid #3B82F6;
  }
  /* Body */
  .body {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }
  /* Cards */
  .card {
    background: #1E293B;
    border-radius: 16px;
    margin-bottom: 12px;
    border: 1px solid #334155;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card.done { border-color: #22C55E33; }
  .card-inner { padding: 14px 16px; }
  .cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .box-kr {
    background: #0F172A;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .box-kr .label { font-size: 12px; color: #94A3B8; margin-bottom: 4px; }
  .box-kr .text { font-size: 17px; font-weight: 700; color: #F1F5F9; }
  .box-en {
    background: #162032;
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid #1E3A5F;
  }
  .box-en .label { font-size: 12px; color: #60A5FA; margin-bottom: 6px; }
  .box-en .text-row { display: flex; align-items: center; gap: 10px; }
  .box-en .text { flex: 1; font-size: 16px; font-weight: 600; color: #93C5FD; font-style: italic; line-height: 1.4; }
  .pron-tip {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #1E3A5F;
    font-size: 12px;
    color: #64748B;
    line-height: 1.5;
  }
  .pron-label { font-size: 11px; color: #475569; margin-bottom: 3px; }
  /* Speak button */
  .speak-btn {
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .speak-btn.md {
    width: 36px; height: 36px; font-size: 16px;
    background: linear-gradient(135deg, #1E40AF, #3B82F6);
    box-shadow: 0 2px 8px #3B82F633;
  }
  .speak-btn.sm {
    width: 28px; height: 28px; font-size: 13px;
    background: linear-gradient(135deg, #1E40AF, #3B82F6);
  }
  .speak-btn.playing {
    background: linear-gradient(135deg, #F59E0B, #D97706) !important;
    box-shadow: 0 0 0 3px #F59E0B44 !important;
  }
  /* Save button */
  .save-btn {
    width: 100%;
    border: none;
    cursor: pointer;
    padding: 12px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    transition: all 0.2s;
  }
  .save-btn.unsaved {
    background: linear-gradient(90deg, #1E3A5F, #1E4A7F);
    color: #60A5FA;
  }
  .save-btn.saved {
    background: #0F2B1A;
    color: #22C55E;
    cursor: default;
  }
  /* Progress dots */
  .progress-dots { display: flex; gap: 4px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid #334155;
    background: #1E293B;
    transition: background 0.3s;
  }
  .dot.done { background: #22C55E; }
  /* Review */
  .progress-bar-row { display: flex; gap: 4px; }
  .prog-seg { height: 4px; border-radius: 2px; background: #1E293B; transition: background 0.3s; }
  .prog-seg.past { background: #22C55E; }
  .prog-seg.current { background: #3B82F6; }
  /* Voice input area */
  .voice-area {
    background: #0F172A;
    border: 2px solid #334155;
    border-radius: 16px;
    padding: 20px 16px 16px;
    text-align: center;
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .voice-area.listening {
    border-color: #EF4444;
    box-shadow: 0 0 0 4px #EF444422;
  }
  .voice-area.correct { border-color: #22C55E; box-shadow: 0 0 0 3px #22C55E22; }
  .voice-area.wrong   { border-color: #F87171; box-shadow: 0 0 0 3px #F8717122; }
  .voice-area.revealed{ border-color: #F59E0B; box-shadow: 0 0 0 3px #F59E0B22; }

  /* Mic button */
  .mic-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 30px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1E40AF, #3B82F6);
    box-shadow: 0 4px 16px #3B82F644;
    transition: all 0.2s;
    position: relative;
  }
  .mic-btn:disabled { opacity: 0.4; cursor: default; }
  .mic-btn.listening {
    background: linear-gradient(135deg, #DC2626, #EF4444);
    box-shadow: 0 0 0 8px #EF444422, 0 4px 16px #EF444466;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 8px #EF444422, 0 4px 16px #EF444466; }
    50%      { box-shadow: 0 0 0 18px #EF44440D, 0 4px 20px #EF444488; }
  }
  /* Waveform bars */
  .waveform {
    display: flex; align-items: center; gap: 4px; height: 24px;
  }
  .wave-bar {
    width: 4px; border-radius: 2px;
    background: #EF4444;
    animation: wave 0.8s ease-in-out infinite;
  }
  .wave-bar:nth-child(1){ height:8px;  animation-delay:0s; }
  .wave-bar:nth-child(2){ height:18px; animation-delay:0.1s; }
  .wave-bar:nth-child(3){ height:12px; animation-delay:0.2s; }
  .wave-bar:nth-child(4){ height:22px; animation-delay:0.15s; }
  .wave-bar:nth-child(5){ height:10px; animation-delay:0.05s; }
  .wave-bar:nth-child(6){ height:16px; animation-delay:0.25s; }
  .wave-bar:nth-child(7){ height:8px;  animation-delay:0.1s; }
  @keyframes wave {
    0%,100% { transform: scaleY(1); opacity:0.7; }
    50%      { transform: scaleY(1.8); opacity:1; }
  }
  /* Transcript display */
  .transcript-box {
    width: 100%;
    background: #1E293B;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 16px;
    color: #F1F5F9;
    font-style: italic;
    min-height: 42px;
    text-align: left;
    line-height: 1.5;
    word-break: break-word;
  }
  .transcript-box.empty { color: #475569; font-style: normal; font-size: 14px; }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    border: none;
    border-radius: 14px;
    padding: 14px 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-reveal {
    flex: 1;
    background: #1E293B;
    border: 1px solid #334155 !important;
    color: #94A3B8;
  }
  .btn-submit {
    flex: 2;
    background: linear-gradient(90deg, #1E40AF, #1D4ED8);
    color: #fff;
  }
  .btn-submit.wide { flex: 1; }
  .btn-submit:disabled {
    background: #1E293B;
    color: #475569;
    cursor: default;
  }
  .btn-next {
    width: 100%;
    margin-top: 12px;
    background: linear-gradient(90deg, #1E3A5F, #1E4A7F);
    color: #60A5FA;
    border-radius: 12px;
    padding: 14px;
    font-weight: 700;
    font-size: 14px;
    font-family: inherit;
    border: none;
    cursor: pointer;
  }
  .btn-restart {
    width: 100%;
    background: linear-gradient(90deg, #1E3A5F, #1E4A7F);
    border: none;
    color: #60A5FA;
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    font-family: inherit;
    margin-top: 8px;
  }
  /* Feedback box */
  .feedback-box {
    border-radius: 14px;
    padding: 16px;
    margin-top: 10px;
  }
  .feedback-box.correct-fb { background: #0F2B1A; border: 1px solid #22C55E44; }
  .feedback-box.wrong-fb { background: #1F0F0F; border: 1px solid #F8717144; }
  .feedback-box.revealed-fb { background: #1A1400; border: 1px solid #F59E0B44; }
  .answer-box {
    margin-top: 12px;
    background: #0F172A;
    border-radius: 10px;
    padding: 10px 14px;
  }
  .answer-reveal-box {
    background: #162032;
    border: 1px solid #1E3A5F;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 12px;
  }
  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: #1E293B;
    border-radius: 16px;
    padding: 18px;
    border: 1px solid #334155;
  }
  .stat-icon { font-size: 24px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #64748B; margin-top: 2px; }
  .prog-track { height: 6px; background: #0F172A; border-radius: 3px; margin-top: 4px; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  /* Result cards */
  .result-card {
    background: #1E293B;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
  }
  /* Complete banner */
  .complete-banner {
    text-align: center;
    padding: 24px;
    background: #0F2B1A;
    border-radius: 16px;
    border: 1px solid #22C55E44;
    margin-top: 12px;
  }
  /* Section title */
  .section-title { font-weight: 700; margin-bottom: 12px; }
  /* Empty state */
  .empty-state { text-align: center; padding: 40px; }
  /* Score card */
  .score-card {
    text-align: center;
    background: #1E293B;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 16px;
    border: 1px solid #334155;
  }
  /* Loader */
  .loader { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Utility */
  .flex-between { display: flex; align-items: center; justify-content: space-between; }
  .flex-center { display: flex; align-items: center; gap: 8px; }
  .hidden { display: none !important; }
  .text-muted { color: #64748B; }
  .text-blue { color: #60A5FA; }
  .text-green { color: #22C55E; }
  .text-red { color: #F87171; }
  .text-amber { color: #F59E0B; }
  .text-slate { color: #94A3B8; }
  .text-indigo { color: #93C5FD; }
  small { font-size: 11px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <span class="header-logo">🌏</span>
    <div>
      <div class="header-title">여행 영어 마스터</div>
      <div class="header-sub">Travel English · 매일 5문장</div>
    </div>
    <div class="header-badge" id="savedCount">저장 0문장</div>
  </div>
  <div class="tabs" style="max-width:480px;margin:12px auto 0;">
    <button class="tab-btn active" onclick="switchTab('daily')">📖 오늘의 학습</button>
    <button class="tab-btn" onclick="startReview()">🔄 복습하기</button>
    <button class="tab-btn" onclick="switchTab('progress')">📊 학습 현황</button>
  </div>
</div>

<!-- BODY -->
<div class="body">

  <!-- ════ DAILY ════ -->
  <div id="tab-daily">
    <div class="flex-between" style="margin-bottom:16px;">
      <div>
        <div style="font-size:16px;font-weight:700;">오늘의 여행 영어</div>
        <div style="font-size:12px;color:#64748B;" id="todayMeta"></div>
      </div>
      <div class="progress-dots" id="progressDots"></div>
    </div>
    <div id="dailyCards"></div>
    <div id="completeBanner" class="complete-banner hidden">
      <div style="font-size:36px;margin-bottom:8px;">🎉</div>
      <div style="font-weight:700;color:#22C55E;margin-bottom:4px;">오늘 학습 완료!</div>
      <div style="font-size:13px;color:#64748B;">복습하기 탭에서 연습해보세요</div>
    </div>
  </div>

  <!-- ════ REVIEW ════ -->
  <div id="tab-review" class="hidden">
    <!-- empty -->
    <div id="reviewEmpty" class="empty-state hidden">
      <div style="font-size:48px;margin-bottom:12px;">📭</div>
      <div style="font-weight:700;margin-bottom:8px;">저장된 문장이 없어요</div>
      <div style="font-size:13px;color:#64748B;">오늘의 학습에서 문장을 저장하면<br>여기서 복습할 수 있어요!</div>
      <button onclick="switchTab('daily')" style="margin-top:20px;background:#1E3A5F;border:none;color:#60A5FA;padding:12px 24px;border-radius:12px;cursor:pointer;font-weight:700;font-family:inherit;">
        학습하러 가기 →
      </button>
    </div>
    <!-- quiz -->
    <div id="reviewQuiz" class="hidden">
      <div class="flex-between" style="margin-bottom:16px;">
        <div style="font-size:13px;color:#64748B;" id="quizCounter">문제 1 / 10</div>
        <div class="progress-bar-row" id="quizProgBar"></div>
      </div>
      <div id="questionCard" class="card" style="margin-bottom:14px;">
        <div class="card-inner">
          <div class="flex-between" style="margin-bottom:14px;">
            <span id="qCatBadge" class="cat-badge"></span>
            <span style="font-size:11px;color:#475569;">영어로 번역하세요</span>
          </div>
          <div id="qKorean" style="font-size:22px;font-weight:700;line-height:1.4;"></div>
        </div>
      </div>
      <!-- Answer reveal box -->
      <div id="revealBox" class="answer-reveal-box hidden">
        <div style="font-size:11px;color:#60A5FA;margin-bottom:6px;">💡 정답</div>
        <div class="flex-center" style="gap:10px;">
          <div id="revealText" style="flex:1;font-size:16px;font-weight:700;color:#93C5FD;font-style:italic;"></div>
          <button class="speak-btn md" id="revealSpeakBtn" onclick="speakReveal()">🔊</button>
        </div>
        <div id="revealTip" style="margin-top:8px;font-size:12px;color:#475569;"></div>
      </div>
      <!-- Voice input area -->
      <div class="voice-area" id="voiceArea">
        <div class="waveform hidden" id="waveform">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="마이크 버튼을 눌러 말하세요">🎤</button>
        <div style="font-size:13px;color:#64748B;" id="micHint">마이크를 눌러 영어로 말하세요</div>
        <div class="transcript-box empty" id="transcriptBox">인식된 음성이 여기에 표시됩니다</div>
      </div>
      <div class="btn-row" id="actionRow">
        <button class="btn btn-reveal" id="revealBtn" onclick="revealAnswer()">👀 정답 보기</button>
        <button class="btn btn-submit" id="submitBtn" onclick="submitAnswer()" disabled>✓ 제출하기</button>
      </div>
      <!-- Feedback -->
      <div id="feedbackBox" class="hidden"></div>
    </div>
    <!-- results -->
    <div id="reviewResults" class="hidden"></div>
  </div>

  <!-- ════ PROGRESS ════ -->
  <div id="tab-progress" class="hidden">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">💾</div>
        <div class="stat-value text-blue" id="statTotal">0</div>
        <div class="stat-label">총 저장 문장</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-value text-green" id="statToday">0/5</div>
        <div class="stat-label">오늘 학습</div>
      </div>
    </div>
    <div class="card" style="padding:16px;margin-bottom:16px;">
      <div class="section-title">카테고리별 저장 현황</div>
      <div id="catProgress"></div>
    </div>
    <div id="savedList"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════════
const BANK = [

function getTodayKey(){ return new Date().toISOString().split("T")[0]; }

function loadSaved(){ try{ return JSON.parse(localStorage.getItem("te_saved")||"[]"); }catch{ return []; } }
function saveSavedList(arr){ localStorage.setItem("te_saved", JSON.stringify(arr)); }

function loadLearnedToday(){
  try{ return new Set(JSON.parse(localStorage.getItem("te_learned_"+getTodayKey())||"[]")); }catch{ return new Set(); }
}
function saveLearnedToday(set){
  localStorage.setItem("te_learned_"+getTodayKey(), JSON.stringify([...set]));
}

let savedSentences = loadSaved();
let learnedToday = loadLearnedToday();

function getTodaySentences(){
  const seed = getTodayKey().replace(/-/g,"");
  let hash = parseInt(seed) % BANK.length;
  const idx = [];
  while(idx.length < 5){
    if(!idx.includes(hash)) idx.push(hash);
    hash = (hash*7+13) % BANK.length;
  }
  return idx.map(i => BANK[i]);
}
const todaySentences = getTodaySentences();

// SPEECH
// ══════════════════════════════════════════════════════════════
let currentBtn = null;
function speak(text, btn){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  if(currentBtn){ currentBtn.textContent="🔊"; currentBtn.classList.remove("playing"); }
  const u = new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.85; u.pitch=1.05;
  const voices = window.speechSynthesis.getVoices();
  const pref = voices.find(v=>v.lang.startsWith("en")&&
    (v.name.includes("Samantha")||v.name.includes("Karen")||
     v.name.includes("Daniel")||v.name.includes("Google US English")||
     v.name.includes("Microsoft Aria")||v.name.includes("Alex")));
  if(pref) u.voice=pref;
  if(btn){ btn.textContent="⏹"; btn.classList.add("playing"); currentBtn=btn; }
  u.onend=u.onerror=()=>{ if(btn){ btn.textContent="🔊"; btn.classList.remove("playing"); } currentBtn=null; };
  window.speechSynthesis.speak(u);
}
window.speechSynthesis?.addEventListener?.("voiceschanged",()=>{});

}

function markLearned(i){
  const s = todaySentences[i];

    savedSentences.push({...s, savedAt: new Date().toISOString()});
    saveSavedList(savedSentences);
  }
  learnedToday.add(i);
  saveLearnedToday(learnedToday);
  renderDaily();
}

function updateHeader(){

}

let reviewQueue = [], reviewIdx = 0, reviewResults = [];
let answerRevealed = false, feedbackShown = false;
let recognition = null, isListening = false, currentTranscript = "";

// ── Speech Recognition setup ──────────────────────────────────
function initRecognition(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.lang = "en-US";
  r.continuous = false;
  r.interimResults = true;

  r.onstart = () => {
    isListening = true;
    document.getElementById("micBtn").classList.add("listening");
    document.getElementById("micBtn").textContent = "⏹";
    document.getElementById("micHint").textContent = "듣고 있어요... 영어로 말하세요";
    document.getElementById("waveform").classList.remove("hidden");
    document.getElementById("voiceArea").classList.add("listening");
  };

  r.onresult = (e) => {
    let interim = "", final = "";
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += t;
      else interim += t;
    }
    if(final) currentTranscript = final.trim();
    const display = currentTranscript || interim;
    const box = document.getElementById("transcriptBox");
    box.textContent = display || "인식된 음성이 여기에 표시됩니다";
    box.className = "transcript-box" + (display ? "" : " empty");
    updateSubmitBtn();
  };

  r.onerror = (e) => {
    stopListening();
    const msgs = {
      "not-allowed":"마이크 접근이 차단되었습니다. 브라우저 설정에서 마이크를 허용해주세요.",
      "no-speech":"음성이 감지되지 않았어요. 다시 시도해보세요.",
      "network":"네트워크 오류가 발생했습니다.",
    };
    document.getElementById("micHint").textContent = msgs[e.error] || "오류: "+e.error;
  };

  r.onend = () => { stopListening(); };
  return r;
}

function toggleMic(){
  if(feedbackShown) return;
  if(isListening){
    recognition?.stop();
  } else {
    currentTranscript = "";
    recognition = initRecognition();
    if(!recognition){
      document.getElementById("micHint").textContent = "이 브라우저는 음성 인식을 지원하지 않아요 (Chrome 권장)";
      return;
    }
    try{ recognition.start(); } catch(e){ console.warn(e); }
  }
}

function stopListening(){
  isListening = false;
  const btn = document.getElementById("micBtn");
  btn.classList.remove("listening");
  btn.textContent = "🎤";
  document.getElementById("waveform").classList.add("hidden");
  document.getElementById("voiceArea").classList.remove("listening");
  document.getElementById("micHint").textContent = currentTranscript
    ? "다시 누르면 다시 말할 수 있어요"
    : "마이크를 눌러 영어로 말하세요";
}

function startReview(){
  switchTab("review");
  if(savedSentences.length===0){
    document.getElementById("reviewEmpty").classList.remove("hidden");
    document.getElementById("reviewQuiz").classList.add("hidden");
    document.getElementById("reviewResults").classList.add("hidden");
    return;
  }
  reviewQueue = [...savedSentences].sort(()=>Math.random()-0.5).slice(0,10);
  reviewIdx = 0; reviewResults = [];
  document.getElementById("reviewEmpty").classList.add("hidden");
  document.getElementById("reviewResults").classList.add("hidden");
  document.getElementById("reviewQuiz").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion(){
  const q = reviewQueue[reviewIdx];
  const cc = CAT[q.c]||{bg:"#F9FAFB",ac:"#6B7280",icon:"💬"};
  answerRevealed = false;
  feedbackShown = false;

  // counter
  document.getElementById("quizCounter").textContent = `문제 ${reviewIdx+1} / ${reviewQueue.length}`;

  // progress bar
  const bar = document.getElementById("quizProgBar");
  bar.innerHTML = reviewQueue.map((_,i)=>`<div class="prog-seg${i<reviewIdx?" past":i===reviewIdx?" current":""}" style="width:${Math.max(16,200/reviewQueue.length)}px;"></div>`).join("");

  // question
  document.getElementById("qCatBadge").innerHTML = `<span>${cc.icon}</span> <span style="background:${cc.bg};color:${cc.ac};padding:2px 6px;border-radius:12px;">${q.c}</span>`;
  document.getElementById("qKorean").textContent = q.k;

  // reset reveal
  document.getElementById("revealBox").classList.add("hidden");
  document.getElementById("revealBtn").classList.remove("hidden");
  document.getElementById("revealBtn").disabled = false;

  // reset voice area
  if(isListening){ recognition?.stop(); }
  currentTranscript = "";
  const vArea = document.getElementById("voiceArea");
  vArea.className = "voice-area";
  document.getElementById("micBtn").disabled = false;
  document.getElementById("micBtn").classList.remove("listening");
  document.getElementById("micBtn").textContent = "🎤";
  document.getElementById("micHint").textContent = "마이크를 눌러 영어로 말하세요";
  document.getElementById("waveform").classList.add("hidden");
  const tBox = document.getElementById("transcriptBox");
  tBox.textContent = "인식된 음성이 여기에 표시됩니다";
  tBox.className = "transcript-box empty";

  // reset buttons
  document.getElementById("actionRow").classList.remove("hidden");
  document.getElementById("submitBtn").disabled = true;
  document.getElementById("submitBtn").textContent = "✓ 제출하기";
  document.getElementById("submitBtn").className = "btn btn-submit";

  // reset feedback
  document.getElementById("feedbackBox").classList.add("hidden");
  document.getElementById("feedbackBox").innerHTML = "";
}

function updateSubmitBtn(){
  const val = currentTranscript.trim();
  const btn = document.getElementById("submitBtn");
  btn.disabled = !val || feedbackShown;
  btn.style.background = val ? "linear-gradient(90deg,#1E40AF,#1D4ED8)" : "";
}

function revealAnswer(){
  const q = reviewQueue[reviewIdx];
  answerRevealed = true;
  if(isListening){ recognition?.stop(); }

  document.getElementById("revealText").textContent = q.e;
  document.getElementById("revealTip").textContent = TIPS[q.e]||"";
  document.getElementById("revealBox").classList.remove("hidden");
  document.getElementById("revealBtn").classList.add("hidden");

  document.getElementById("micHint").textContent = "정답을 보고 소리내어 읽어보세요";
  document.getElementById("voiceArea").classList.add("revealed");
  document.getElementById("micBtn").disabled = true;

  reviewResults.push({...q, userAnswer:"(정답 보기)", result:{correct:false, score:0, feedback_korean:"정답을 확인했습니다. 다음엔 스스로 도전해 보세요! 💪", tip_korean:""}});
  feedbackShown = true;

  document.getElementById("actionRow").classList.add("hidden");
  showFeedback({correct:false, score:0, feedback_korean:"정답을 확인했습니다. 다음엔 스스로 도전해 보세요! 💪", tip_korean:""}, q, true);
}

function speakReveal(){
  const btn = document.getElementById("revealSpeakBtn");
  const text = document.getElementById("revealText").textContent;
  speak(text, btn);
}

async function submitAnswer(){
  if(feedbackShown) return;
  const val = currentTranscript.trim();
  if(!val) return;
  if(isListening){ recognition?.stop(); }

  const q = reviewQueue[reviewIdx];
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="loader">⏳</span> AI 채점 중...';
  document.getElementById("micBtn").disabled = true;
  document.getElementById("revealBtn").disabled = true;

  let result;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:500,
        messages:[{role:"user",content:`You are a travel English teacher. Evaluate this spoken answer (from speech recognition, so minor errors are expected).
Korean: "${q.k}"
Correct: "${q.e}"
Student said: "${val}"
Respond ONLY in JSON (no markdown):
{"correct":true/false,"score":0-100,"feedback_korean":"한국어 피드백 2줄 이내","tip_korean":"칭찬 또는 발음 팁 1줄"}
Be generous: speech recognition may have minor transcription errors. Focus on meaning and key vocabulary.`}]
      })
    });
    const data = await res.json();
    const text = data.content.map(b=>b.text||"").join("");
    result = JSON.parse(text.replace(/```json|```/g,"").trim());
  } catch(err) {
    result = {correct:false, score:0, feedback_korean:"채점 중 오류가 발생했습니다.", tip_korean:""};
  }

  feedbackShown = true;
  document.getElementById("voiceArea").classList.add(result.correct ? "correct" : "wrong");
  reviewResults.push({...q, userAnswer:val, result});
  document.getElementById("actionRow").classList.add("hidden");
  showFeedback(result, q, false);
}

function showFeedback(result, q, revealed){
  const box = document.getElementById("feedbackBox");
  box.classList.remove("hidden");
  const cls = result.correct ? "correct-fb" : revealed ? "revealed-fb" : "wrong-fb";
  const icon = result.correct ? "🎯" : revealed ? "📖" : "❌";
  const label = result.correct ? "정답!" : revealed ? "정답 확인" : "오답";
  const color = result.correct ? "#22C55E" : revealed ? "#F59E0B" : "#F87171";
  const tip = TIPS[q.e]||"";

  box.innerHTML = `
    <div class="feedback-box ${cls}">
      <div class="flex-center" style="margin-bottom:10px;">
        <span style="font-size:24px;">${icon}</span>
        <span style="font-weight:700;color:${color};">${label} · ${result.score}점</span>
      </div>
      <div style="font-size:13px;color:#94A3B8;margin-bottom:6px;">${result.feedback_korean}</div>
      ${result.tip_korean?`<div style="font-size:13px;color:#60A5FA;">💡 ${result.tip_korean}</div>`:""}
      ${!revealed?`
      <div class="answer-box" style="margin-top:12px;">
        <div style="font-size:11px;color:#475569;margin-bottom:4px;">모범 답안</div>
        <div class="flex-center" style="gap:10px;">
          <div style="flex:1;color:#93C5FD;font-weight:600;font-style:italic;">${q.e}</div>
          <button class="speak-btn sm" onclick="speak('${q.e.replace(/'/g,"\\'")}',this)">🔊</button>
        </div>
        ${tip?`<div style="margin-top:8px;font-size:12px;color:#475569;">${tip}</div>`:""}
      </div>`:""}
      <button class="btn-next" onclick="nextQuestion()">${reviewIdx+1>=reviewQueue.length?"결과 보기 →":"다음 문제 →"}</button>
    </div>
  `;
}

function nextQuestion(){
  if(reviewIdx+1>=reviewQueue.length){
    showResults();
  } else {
    reviewIdx++;
    loadQuestion();
  }
}

function showResults(){
  document.getElementById("reviewQuiz").classList.add("hidden");
  const div = document.getElementById("reviewResults");
  div.classList.remove("hidden");
  const avg = Math.round(reviewResults.reduce((a,b)=>a+b.result.score,0)/reviewResults.length);
  const trophy = avg>=80?"🏆":avg>=60?"👏":"💪";
  const scoreColor = avg>=80?"#22C55E":avg>=60?"#F59E0B":"#F87171";

  div.innerHTML = `
    <div class="score-card">
      <div style="font-size:48px;margin-bottom:8px;">${trophy}</div>
      <div style="font-size:28px;font-weight:700;color:${scoreColor};">${avg}점</div>
      <div style="font-size:14px;color:#94A3B8;margin-top:4px;">${reviewQueue.length}문제 완료</div>
    </div>
    ${reviewResults.map((r,i)=>{
      const cc=CAT[r.c]||{bg:"#F9FAFB",ac:"#6B7280",icon:"💬"};
      const bc=r.result.correct?"#22C55E44":"#F8717144";
      return `<div class="result-card" style="border:1px solid ${bc};">
        <div style="font-size:11px;color:#64748B;margin-bottom:4px;">Q${i+1} · ${r.c}</div>
        <div style="font-weight:600;margin-bottom:6px;font-size:14px;">${r.k}</div>
        <div style="font-size:13px;color:${r.result.correct?"#22C55E":"#F87171"};margin-bottom:4px;">내 답: ${r.userAnswer}</div>
        <div class="flex-center" style="gap:8px;">
          <div style="flex:1;font-size:13px;color:#60A5FA;">정답: ${r.e}</div>
          <button class="speak-btn sm" onclick="speak('${r.e.replace(/'/g,"\\'")}',this)">🔊</button>
        </div>
        ${r.result.tip_korean?`<div style="font-size:12px;color:#94A3B8;margin-top:6px;">💡 ${r.result.tip_korean}</div>`:""}
      </div>`;
    }).join("")}
    <button class="btn-restart" onclick="startReview()">🔄 다시 복습하기</button>
  `;
}

// ══════════════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════════════
function renderProgress(){
  document.getElementById("statTotal").textContent = savedSentences.length;
  document.getElementById("statToday").textContent = learnedToday.size+"/5";

  const catProg = document.getElementById("catProgress");
  catProg.innerHTML = Object.entries(CAT).map(([cat,cc])=>{
    const count = savedSentences.filter(s=>s.c===cat).length;
    const total = BANK.filter(s=>s.c===cat).length;
    const pct = total>0?Math.round(count/total*100):0;
    return `<div style="margin-bottom:12px;">
      <div class="flex-between" style="margin-bottom:4px;">
        <span style="font-size:13px;">${cc.icon} ${cat}</span>
        <span style="font-size:12px;color:#64748B;">${count}/${total}</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${cc.ac};"></div></div>
    </div>`;
  }).join("");

  const list = document.getElementById("savedList");
  if(savedSentences.length===0){ list.innerHTML=""; return; }
  list.innerHTML = `<div class="section-title">저장된 모든 문장 (${savedSentences.length})</div>` +
    [...savedSentences].reverse().map(s=>{
      const cc=CAT[s.c]||{bg:"#F9FAFB",ac:"#6B7280",icon:"💬"};
      return `<div class="card" style="border-radius:12px;padding:12px 14px;margin-bottom:8px;">
        <div class="flex-between" style="margin-bottom:6px;">
          <span class="cat-badge" style="background:${cc.bg};color:${cc.ac};font-size:11px;">${cc.icon} ${s.c}</span>
          <span style="font-size:11px;color:#475569;">${(s.savedAt||"").split("T")[0]}</span>
        </div>
        <div style="font-weight:600;margin-bottom:4px;font-size:14px;">${s.k}</div>
        <div class="flex-center" style="gap:8px;">
          <div style="flex:1;font-size:13px;color:#60A5FA;font-style:italic;">${s.e}</div>
          <button class="speak-btn sm" onclick="speak('${s.e.replace(/'/g,"\\'")}',this)">🔊</button>
        </div>
      </div>`;
    }).join("");
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
renderDaily();
updateHeader();
</script>
